# wrangler.toml — Cloudflare Containers deployment for ObjectStack Cloud.
#
# The cloud control plane runs as a long-lived Node.js process (Hono +
# better-sqlite3 + child_process), so it is incompatible with Workers V8
# isolates. Cloudflare Containers (GA 2025) lets us deploy the production
# Docker image as a Durable Object-backed container, fronted by a tiny
# Worker that proxies HTTP to it.
#
# ────────────────────────── Deployment workflow ──────────────────────────
#
# 1. Build the image from the *repository root* (the Dockerfile expects
#    the full pnpm workspace as its build context):
#
#      docker build \
#        -f apps/cloud/Dockerfile \
#        -t registry.cloudflare.com/<account-id>/objectstack-cloud:latest .
#
# 2. Push to the Cloudflare container registry:
#
#      wrangler containers push \
#        registry.cloudflare.com/<account-id>/objectstack-cloud:latest
#
# 3. Set required secrets (Turso URL + token, auth secret, …):
#
#      wrangler secret put OS_DATABASE_URL --config apps/cloud/wrangler.toml
#      wrangler secret put OS_DATABASE_AUTH_TOKEN --config apps/cloud/wrangler.toml
#      wrangler secret put AUTH_SECRET --config apps/cloud/wrangler.toml
#      wrangler secret put TURSO_API_TOKEN --config apps/cloud/wrangler.toml
#      wrangler secret put TURSO_ORG_NAME --config apps/cloud/wrangler.toml
#
# 4. Deploy the Worker + Container binding:
#
#      wrangler deploy --config apps/cloud/wrangler.toml
#
# ─────────────────────────────────────────────────────────────────────────

name = "objectstack-cloud"
main = "cloudflare/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ── Container definition ────────────────────────────────────────────────
# `image` points at the OCI tag pushed in step 2 above. Update <account-id>
# to your Cloudflare account id. The image tag is the source of truth —
# rebuild + re-push to ship a new version, then run `wrangler deploy`.
[[containers]]
class_name = "CloudContainer"
image = "registry.cloudflare.com/2846eb40a60f4738e292b90dcd8cce10/objectstack-cloud:a3ab2d4a"
max_instances = 3
instance_type = "standard-1"

# Non-secret environment is set on the `CloudContainer` class (`envVars`
# field in cloudflare/worker.ts). Secrets are injected via
# `wrangler secret put` and surface as env vars inside the container at
# process spawn time.

# ── Durable Object binding for the container class ──────────────────────
[[durable_objects.bindings]]
name = "CLOUD"
class_name = "CloudContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CloudContainer"]

# ── Observability ───────────────────────────────────────────────────────
[observability]
enabled = true

# ── Worker-only vars (NOT injected into the Container process) ──────────
# Container env is set on the CloudContainer class in cloudflare/worker.ts
# (envVars field). Anything the Node.js runtime reads via process.env —
# AUTH_BASE_URL, OS_TRUSTED_ORIGINS, etc. — MUST live there, not here.
# This [vars] block is intentionally empty.
# [vars]