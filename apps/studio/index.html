<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ObjectStack Studio</title>
    <script>
      // Apply theme before React mounts so the user never sees a light flash
      // on dark theme (or vice versa). Mirrors theme-toggle.tsx logic.
      (function applyInitialTheme() {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || (stored !== 'light' && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
          // Set bg-color directly on <html> so any area outside the React
          // tree (e.g. router pending fallback) matches the theme.
          document.documentElement.style.backgroundColor = dark ? 'hsl(240 10% 3.9%)' : 'hsl(0 0% 100%)';
        } catch (_) { /* localStorage unavailable — fall through to CSS defaults */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
