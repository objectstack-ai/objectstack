# Single-host production stack: ObjectStack app + Postgres.
#
# Copy next to the Dockerfile in your scaffolded project, create a .env file
# (never committed) with POSTGRES_PASSWORD / OS_AUTH_SECRET / OS_SECRET_KEY
# (generate secrets with `openssl rand -hex 32`), then `docker compose up -d`.
#
# Docs: https://docs.objectstack.ai/docs/deployment/self-hosting

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      OS_DATABASE_URL: postgres://objectstack:${POSTGRES_PASSWORD}@db:5432/myapp
      OS_AUTH_SECRET: ${OS_AUTH_SECRET}
      OS_SECRET_KEY: ${OS_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: objectstack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: myapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U objectstack -d myapp"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
